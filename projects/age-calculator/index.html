<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center px-4">

  <main class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-2xl p-8">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-indigo-100">
          <span class="text-3xl">🎂</span>
        </div>

        <h1 class="text-3xl font-bold text-gray-900">
          Age Calculator
        </h1>

        <p class="mt-2 text-sm text-gray-500">
          Select your date of birth and calculate your exact age.
        </p>
      </div>

      <!-- Input -->
      <div class="mb-5">
        <label for="birthDate" class="mb-2 block text-sm font-semibold text-gray-700">
          Date of Birth
        </label>

        <input
          type="date"
          id="birthDate"
          class="w-full rounded-xl border border-gray-300 px-4 py-3 text-gray-700 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
        />
      </div>

      <!-- Button -->
      <button
        type="button"
        id="calculateBtn"
        class="w-full rounded-xl bg-indigo-600 px-4 py-3 font-semibold text-white shadow-lg shadow-indigo-200 transition hover:bg-indigo-700 active:scale-[0.98]"
      >
        Calculate Age
      </button>

      <!-- Error Message -->
      <p
        id="errorMessage"
        class="mt-4 hidden rounded-lg bg-red-50 px-4 py-3 text-sm font-medium text-red-600"
      >
        Please select a valid date of birth.
      </p>

      <!-- Result Box -->
      <div
        id="resultBox"
        class="mt-6 hidden rounded-2xl bg-gray-50 p-5 text-center"
      >
        <p class="mb-4 text-sm font-medium text-gray-500">
          Your Age Is
        </p>

        <div class="grid grid-cols-3 gap-3">
          <!-- Years -->
          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 id="years" class="text-3xl font-bold text-indigo-600">
              0
            </h2>
            <p class="mt-1 text-xs font-semibold uppercase tracking-wide text-gray-500">
              Years
            </p>
          </div>

          <!-- Months -->
          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 id="months" class="text-3xl font-bold text-purple-600">
              0
            </h2>
            <p class="mt-1 text-xs font-semibold uppercase tracking-wide text-gray-500">
              Months
            </p>
          </div>

          <!-- Days -->
          <div class="rounded-xl bg-white p-4 shadow-sm">
            <h2 id="days" class="text-3xl font-bold text-pink-600">
              0
            </h2>
            <p class="mt-1 text-xs font-semibold uppercase tracking-wide text-gray-500">
              Days
            </p>
          </div>
        </div>
      </div>

    </div>
  </main>

</body>
<script src="script.js"></script>
</html>
