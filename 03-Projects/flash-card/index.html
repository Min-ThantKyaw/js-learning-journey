<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flash Cards</title>

	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

	<div class="w-full max-w-2xl">

		<!-- Header -->
		<h1 class="text-3xl font-bold mb-4">
			Flash Cards
		</h1>

		<!-- Progress -->
		<div class="flex items-center gap-4 mb-4" id="progressBar">
			<div class="flex-1">
				<div class="w-full h-4 bg-gray-200 rounded-full overflow-hidden" id="progressOuter">
					<div class="h-full bg-gray-400 rounded-full" id="progressInner" style="width: 25%"></div>
				</div>
			</div>

			<span class="text-sm font-medium text-gray-600" id="progressText">
				25%
			</span>

			<span class="text-sm font-semibold" id="progressCount">
				5 of 20
			</span>
		</div>

		<!-- Card -->
		<div class="bg-white rounded-2xl border border-gray-300 shadow-sm overflow-hidden">

			<!-- Question -->
			<div class="h-80 flex items-center justify-center p-10 text-center" id="questionArea">
				<p class="text-3xl font-bold leading-relaxed" data-question>
					What is the difference between
					<br>
					var, let, and const?

				</p>
			</div>
			<!-- Answer -->
			<div class="h-80 flex items-center justify-center p-10 text-center" style="display: none;" id="answerArea">
				<p class="text-3xl font-bold leading-relaxed" data-answer>
					What is the difference between
					<br>
					var, let, and const?
				</p>
			</div>

			<!-- Footer -->
			<div class="border-t border-gray-200 flex items-center">

				<button class="flex-1 py-4 text-gray-600 hover:bg-gray-50 transition" id="prevBtn">
					← Previous
				</button>

				<button class="flex-1 py-4 font-semibold hover:bg-gray-50 transition" id="showAnswerBtn">
					Show Answer
				</button>

				<button class="flex-1 py-4 text-gray-600 hover:bg-gray-50 transition" id="nextBtn">
					Next →
				</button>

			</div>
		</div>

	</div>

</body>
<script src="script.js"></script>
</html>
