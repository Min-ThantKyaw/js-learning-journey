<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Counter</title>
	<link rel="stylesheet" href="../src/output.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
	<div class="text-center bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full">
		<h1 class="text-3xl font-black text-gray-800 mb-6">Counter</h1>
		<p id="counter" class="text-6xl font-black mb-8 p-4 rounded-xl bg-gradient-to-br from-gray-50 to-gray-100 border-2 border-gray-200 transition-all duration-200">0</p>
		<div class="flex gap-3 justify-center mb-4">
			<button id="decrement" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition-all active:scale-95">-</button>
			<button id="reset" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition-all active:scale-95">Reset</button>
			<button id="increment" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition-all active:scale-95">+</button>
		</div>
		<p class="text-sm text-gray-500 mt-6">Press <kbd class="px-2 py-1 bg-gray-200 rounded">+</kbd> / <kbd class="px-2 py-1 bg-gray-200 rounded">-</kbd> or <kbd class="px-2 py-1 bg-gray-200 rounded">R</kbd> to reset</p>
	</div>
</body>
<script src="script.js"></script>
</html>
